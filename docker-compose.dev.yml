# Rayavriti NetMonitor — local development
#
# Usage:
#   1. Copy .env.dev.example to .env.dev and adjust values if needed
#   2. docker compose -f docker-compose.dev.yml up --build
#   3. Open http://localhost:5173
#
# Host networking matches production and keeps the Vite proxy, SNMP,
# NetFlow, ping, and packet-capture behavior close to the deployed app.

services:
  redis:
    image: redis:7-alpine
    container_name: rayavriti-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: rayavriti-timescaledb-dev
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: netmonitor
      POSTGRES_USER: netmonitor
      POSTGRES_PASSWORD: netmonitor
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netmonitor -d netmonitor"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: rayavriti-netmonitor-backend-dev
    network_mode: host
    env_file:
      - path: .env.dev
        required: false
    environment:
      DATABASE_URL: postgres://netmonitor:netmonitor@localhost:5433/netmonitor?sslmode=disable
    volumes:
      - .:/app
      - backend-go-modules:/go/pkg/mod
    command: air -c .air.toml
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client-development
    container_name: rayavriti-netmonitor-client-dev
    network_mode: host
    env_file:
      - path: .env.dev
        required: false
    volumes:
      - .:/app
      - client-node-modules:/app/client/node_modules
    command: npm --workspace client run dev -- --host 0.0.0.0
    depends_on:
      - backend

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: rayavriti-netmonitor-simulator-dev
    network_mode: host
    profiles:
      - simulator
    env_file:
      - path: .env.dev
        required: false
    environment:
      SIMULATOR_API_URL: http://localhost:3000
      SIMULATOR_WRITE_MODE: api
    volumes:
      - .:/app
      - backend-go-modules:/go/pkg/mod
    command: >
      sh -c "until wget -qO- http://localhost:3000/health >/dev/null 2>&1;
      do sleep 2; done;
      npm run simulate -- --duration=${SIMULATOR_DURATION:-600}
      --speed=${SIMULATOR_SPEED:-1}
      --scenario=${SIMULATOR_SCENARIO:-mixed}"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  backend-go-modules:
    driver: local
  client-node-modules:
    driver: local