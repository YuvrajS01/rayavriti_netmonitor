<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="180" stroke="url(#grad)" stroke-width="3" opacity="0.25"/>
  <!-- Signal arcs -->
  <path d="M310 150a120 120 0 0 1 0 212" stroke="#8b5cf6" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M340 180a80 80 0 0 1 0 152" stroke="#8b5cf6" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M370 210a40 40 0 0 1 0 92" stroke="#a78bfa" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Central node -->
  <circle cx="240" cy="256" r="56" fill="url(#grad)" opacity="0.15"/>
  <circle cx="240" cy="256" r="40" fill="url(#grad)"/>
  <circle cx="240" cy="256" r="14" fill="#0a0a0f"/>
  <!-- Network lines -->
  <line x1="140" y1="160" x2="210" y2="228" stroke="#6d28d9" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="130" y1="340" x2="208" y2="284" stroke="#6d28d9" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- Satellite nodes -->
  <circle cx="130" cy="150" r="16" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="120" cy="350" r="12" fill="#8b5cf6" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
</svg>