root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/netmonitor"
  cmd = "go build -o ./tmp/netmonitor ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "client", "data", "documentation", "server", "simulator", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = ["backend"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 1000
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true