name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 make g++ libpcap-dev

      - name: Install client dependencies
        run: npm ci --workspace client

      - name: Go vet
        run: go vet ./...
        working-directory: backend

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...
        working-directory: backend

      - name: Frontend lint
        run: npm run lint -w client

      - name: Frontend typecheck
        run: npm run typecheck -w client

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 make g++ libpcap-dev

      - name: Run Go tests
        run: go test ./... -v -count=1 -race
        working-directory: backend

      - name: Run Go tests with coverage
        run: go test ./... -count=1 -coverprofile=coverage.out
        working-directory: backend

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 make g++ libpcap-dev

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        working-directory: backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install client dependencies
        run: npm ci --workspace client

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: client

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 make g++ libpcap-dev

      - name: Install client dependencies
        run: npm ci --workspace client

      - name: Go build
        run: go build -o /dev/null ./cmd/server
        working-directory: backend

      - name: Build client
        run: npm run build -w client

      - name: Check bundle budgets
        run: |
          echo "=== Bundle Size Report ==="
          MAX_JS_KB=600
          MAX_CSS_KB=100
          dist="client/dist"
          for f in "$dist"/assets/*.js; do
            size_kb=$(($(stat -c%s "$f") / 1024))
            name=$(basename "$f")
            echo "  JS: $name — ${size_kb}KB"
            if [ "$size_kb" -gt "$MAX_JS_KB" ]; then
              echo "  WARNING: $name exceeds ${MAX_JS_KB}KB budget"
            fi
          done
          for f in "$dist"/assets/*.css; do
            size_kb=$(($(stat -c%s "$f") / 1024))
            name=$(basename "$f")
            echo "  CSS: $name — ${size_kb}KB"
            if [ "$size_kb" -gt "$MAX_CSS_KB" ]; then
              echo "  WARNING: $name exceeds ${MAX_CSS_KB}KB budget"
            fi
          done
          total_js=$(cat "$dist"/assets/*.js | wc -c)
          total_kb=$((total_js / 1024))
          echo "  Total JS: ${total_kb}KB"
          if [ "$total_kb" -gt 1000 ]; then
            echo "  ERROR: Total JS exceeds 1MB — investigate bundle bloat"
            exit 1
          fi

      - name: Build development image
        run: docker build --target development -t rayavriti-netmonitor:dev .

      - name: Build production image
        run: docker build --target production -t rayavriti-netmonitor:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rayavriti-netmonitor:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  release:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
