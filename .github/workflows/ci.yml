name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 make g++ libpcap-dev

      - name: Install client dependencies
        run: npm ci --workspace client

      - name: Go vet
        run: go vet ./...
        working-directory: backend

      - name: Go build
        run: go build -o /dev/null ./cmd/server
        working-directory: backend

      - name: Build client
        run: npm run build -w client

      - name: Build development image
        run: docker build --target development -t rayavriti-netmonitor:dev .

      - name: Build production image
        run: docker build --target production -t rayavriti-netmonitor:ci .
