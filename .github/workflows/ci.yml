name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck server
        run: npm run typecheck

      - name: Build application
        run: npm run build

      - name: Build development image
        run: docker build --target development -t rayavriti-netmonitor:dev .

      - name: Build production image
        run: docker build --target production -t rayavriti-netmonitor:ci .
