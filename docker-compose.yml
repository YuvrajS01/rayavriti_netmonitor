# Rayavriti NetMonitor — Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and configure required values
#   2. docker compose up -d
#   3. Open http://localhost:3000
#
# NOTE: Uses host networking so the container can directly reach
# local network devices for monitoring, SNMP, and packet capture.
# All ports (3000, 2055/udp) are exposed directly on the host.

services:
  redis:
    image: redis:7-alpine
    container_name: rayavriti-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: rayavriti-timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netmonitor}
      POSTGRES_USER: ${POSTGRES_USER:-netmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netmonitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netmonitor} -d ${POSTGRES_DB:-netmonitor}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  netmonitor:
    build: .
    container_name: rayavriti-netmonitor
    # Host networking is required for:
    #  - Monitoring local network devices (ping, SNMP, port scans)
    #  - Receiving NetFlow/sFlow on UDP 2055
    #  - Packet capture on host interfaces
    # Ports 3000 (HTTP) and 2055 (NetFlow UDP) are available on the host.
    network_mode: host
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-netmonitor}:${POSTGRES_PASSWORD:-netmonitor}@localhost:5433/${POSTGRES_DB:-netmonitor}?sslmode=disable
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    cap_add:
      - NET_RAW              # Required for packet capture (libpcap/cap)
      - NET_ADMIN            # Required for interface access
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  simulator:
    build:
      context: .
      target: development
    container_name: rayavriti-netmonitor-simulator
    network_mode: host
    profiles:
      - simulator
    env_file: .env
    environment:
      SIMULATOR_API_URL: http://localhost:3000
      SIMULATOR_WRITE_MODE: api
    command: >
      sh -c "until wget -qO- http://localhost:3000/health >/dev/null 2>&1;
      do sleep 2; done;
      npm run simulate -- --duration=${SIMULATOR_DURATION:-600}
      --speed=${SIMULATOR_SPEED:-1}
      --scenario=${SIMULATOR_SCENARIO:-mixed}"
    depends_on:
      - netmonitor

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local