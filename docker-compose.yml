# Rayavriti NetMonitor — Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and configure required values
#   2. docker compose up -d
#   3. Open http://localhost:3000
#
# NOTE: Uses host networking so the container can directly reach
# local network devices for monitoring, SNMP, and packet capture.
# All ports (3000, 2055/udp) are exposed directly on the host.

services:
  netmonitor:
    build: .
    container_name: rayavriti-netmonitor
    # Host networking is required for:
    #  - Monitoring local network devices (ping, SNMP, port scans)
    #  - Receiving NetFlow/sFlow on UDP 2055
    #  - Packet capture on host interfaces
    # Ports 3000 (HTTP) and 2055 (NetFlow UDP) are available on the host.
    network_mode: host
    volumes:
      - netmonitor-data:/app/data    # Persist SQLite database
    env_file: .env
    restart: unless-stopped
    cap_add:
      - NET_RAW              # Required for packet capture (libpcap/cap)
      - NET_ADMIN            # Required for interface access
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  simulator:
    build:
      context: .
      target: development
    container_name: rayavriti-netmonitor-simulator
    network_mode: host
    profiles:
      - simulator
    env_file: .env
    environment:
      SIMULATOR_API_URL: http://localhost:3000
      SIMULATOR_WRITE_MODE: api
    command: >
      sh -c "until wget -qO- http://localhost:3000/health >/dev/null 2>&1;
      do sleep 2; done;
      npm run simulate -- --duration=${SIMULATOR_DURATION:-600}
      --speed=${SIMULATOR_SPEED:-1}
      --scenario=${SIMULATOR_SCENARIO:-mixed}"
    depends_on:
      - netmonitor

volumes:
  netmonitor-data:
    driver: local
